services:
  postgres:
    image: postgres:16-alpine
    container_name: wbos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wbos
      POSTGRES_PASSWORD: wbos
      POSTGRES_DB: wbos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wbos -d wbos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
