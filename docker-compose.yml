services:
  app:
    image: ghcr.io/devhoss/wbos:latest
    container_name: wbos-app
    restart: unless-stopped

    ports:
      - "3005:3000"

    env_file:
      - .env

    environment:
      INTERNAL_APP_URL: http://127.0.0.1:3000
      WBOS_STORAGE_ROOT: /app/storage

    volumes:
      - ./storage:/app/storage
      - ./backups:/app/backups

    networks:
      - homelab

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  homelab:
    external: true